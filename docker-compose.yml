version: '3.8'

services:
  judgeserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: judgeserver-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .env:/app/.env
      - ./generated_csv:/app/generated_csv
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: judgeserver-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: judgenot0
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
